version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: roxstar-postgres
    environment:
      POSTGRES_DB: roxstar_db
      POSTGRES_USER: roxstar_user
      POSTGRES_PASSWORD: roxstar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - roxstar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roxstar_user -d roxstar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: roxstar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - roxstar-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roxstar-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://roxstar_user:roxstar_password@postgres:5432/roxstar_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - roxstar-network
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roxstar-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - roxstar-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  roxstar-network:
    driver: bridge